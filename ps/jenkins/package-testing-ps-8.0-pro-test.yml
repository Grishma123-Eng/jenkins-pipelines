- job:
    name: package-testing-ps-8.0-pro-test
    project-type: pipeline
    description: |
        Do not edit this job through the web!
    properties:
        - build-discarder:
            artifact-days-to-keep: -1
            artifact-num-to-keep: 10
            days-to-keep: -1
            num-to-keep: 10
    pipeline-scm:
        scm:
            - git:
                url: https://github.com/Grishma123-Eng/jenkins-pipelines.git
                branches:
                    - 'amazon-linux-support'
                wipe-workspace: true
        lightweight-checkout: true
        script-path: ps/jenkins/package-testing-ps-8.0-pro-test.groovy
