- job:
    name: proxysql-package-testing-molecule-test
    project-type: pipeline
    description: |
        Do not edit this job through the web!
    properties:
        - build-discarder:
            num-to-keep: 15
    concurrent: true
    pipeline-scm:
        scm:
            - git:
                url: https://github.com/grishma123-eng/jenkins-pipelines.git
                branches:
                    - 'pxb-work'
                wipe-workspace: true
        lightweight-checkout: true
        script-path: pxc/jenkins/proxysql-package-testing-molecule-test.groovy
